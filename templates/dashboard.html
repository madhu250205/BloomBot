<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantCare - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --secondary-color: #388E3C;
            --accent-color: #8BC34A;
            --dark-color: #2E7D32;
            --light-color: #C8E6C9;
            --text-color: #333;
            --text-light: #777;
            --white: #ffffff;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f5f5f5; color: var(--text-color); }

        .content { flex: 1; padding: 20px; background-color: #f9f9f9; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .header h1 { color: var(--primary-color); }

        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background-color: var(--white); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .card h3 { color: var(--text-light); font-size: 1rem; margin-bottom: 10px; }
        .card p { font-size: 2rem; font-weight: bold; color: var(--primary-color); }
        .card .card-icon { display: flex; justify-content: flex-end; font-size: 2.5rem; color: var(--light-color); margin-top: 10px; }
        
        .charts-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .chart-box { background-color: var(--white); border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        .chart-box h2 { font-size: 1.2rem; margin-bottom: 20px; color: var(--primary-color); }

        @media (max-width: 992px) { .charts-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    {% include 'navbar.html' %}

    <main class="content">
        <header class="header">
            <h1>Dashboard Overview</h1>
            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">{{ username }}</span>
                </div>
            </div>
        </header>

        <div class="dashboard-cards">
            <div class="card"><h3>Total Users</h3><p id="totalUsers">{{ total_users }}</p></div>
            <div class="card"><h3>Active Plants</h3><p id="activePlants">{{ active_plants }}</p></div>
            <div class="card"><h3>Needs Water</h3><p id="needsWater">{{ needs_water }}</p></div>
            <div class="card"><h3>Health Issues</h3><p id="healthIssues">{{ health_issues }}</p></div>
        </div>

        <div class="charts-container">
            <div class="chart-box">
                <h2>User Growth</h2>
                <canvas id="userGrowthChart"></canvas>
            </div>
            <div class="chart-box">
                <h2>Plant Health Trend</h2>
                <canvas id="plantChart"></canvas>
            </div>
        </div>
    </main>
<script>
document.addEventListener("DOMContentLoaded", function() {
    // 1. Fetch Dynamic Data from API
    fetch('/api/plant-data')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('plantChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(row => row.date),
                    datasets: [{
                        label: 'Plant Health Score',
                        data: data.map(row => row.health_score),
                        borderColor: 'rgb(75, 192, 192)',
                        tension: 0.1,
                        fill: true,
                        backgroundColor: 'rgba(75, 192, 192, 0.2)'
                    }]
                },
                options: { responsive: true }
            });
        });

    // 2. User Growth Chart
    const growthCtx = document.getElementById('userGrowthChart').getContext('2d');
    new Chart(growthCtx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'New Users',
                data: [120, 190, 170, 220, 280, 350],
                borderColor: 'rgba(76, 175, 80, 1)',
                tension: 0.4
            }]
        }
    });
});
</script>   
</body>
</html>

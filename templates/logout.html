<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logged Out - BloomBot</title>
    <style>
        body { background-color: #e8f5e9; font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 100px; }
        .logout-box { background-color: white; padding: 40px; margin: auto; width: 400px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logout-box h2 { color: #2e7d32; }
        .logout-box a { display: inline-block; margin-top: 20px; text-decoration: none; color: white; background-color: #4CAF50; padding: 10px 20px; border-radius: 6px; font-weight: bold; }
        .logout-box a:hover { background-color: #388e3c; }
    </style>
</head>
<body>
    <div class="logout-box">
        <h2>You have been logged out</h2>
        <p>Thank you for using BloomBot!</p>
        <a href="{{ url_for('login') }}">Login Again</a>
    </div>
</body>
</html>
